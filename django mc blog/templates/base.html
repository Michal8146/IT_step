<!DOCTYPE html>
<html lang="cs" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Survival Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">⛏️ MC BLOG</a>
            
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'home' %}">Domů</a>
                
                {% if user.is_authenticated %}
                    <span class="nav-link text-light">Ahoj, {{ user.username }}</span>
                    <form action="{% url 'logout' %}" method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="nav-link btn btn-link" style="text-decoration: none;">Odhlásit se</button>
                    </form>
                {% else %}
                    <a class="nav-link" href="{% url 'login' %}">Přihlášení</a>
                    <a class="nav-link" href="{% url 'register' %}">Registrace</a>
                {% endif %}
            </div>
            
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} mt-3">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>

    <footer class="container text-center py-4 mt-5 border-top border-secondary text-muted">
        <p>&copy; 2026 Minecraft Survival Blog</p>
    </footer>
</body>
</html>
