{% extends 'base.html' %}

{% block content %}
    <div style="text-align: center;">
        <h1>Welcome to Luigis Pizzeria</h1>
        <p>Authentic, wood-fired pizzas made with love, right in the heart of the city.</p>
        
        <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=800&q=80" alt="Luigis Pizzeria Interior" style="max-width: 100%; border-radius: 8px; margin: 1rem 0; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
    </div>

    <h2>Our Menu</h2>
    <div class="menu">
        {% for item in menu %}
            <div class="menu-item">
                <span class="price">{{ item.price }}</span>
                <h3>{{ item.name }}</h3>
                <p>{{ item.desc }}</p>
            </div>
        {% endfor %}
    </div>
{% endblock %}
